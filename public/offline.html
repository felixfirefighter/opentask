<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F4F1E9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#181914" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <title>OpenTask is offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f4f1e9;
        color: #24251f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        min-height: 100dvh;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: #f4f1e9;
        color: #24251f;
      }

      main {
        width: min(100%, 520px);
        padding: 32px;
        border: 1px solid #d7d0c4;
        border-radius: 20px;
        background: #fcfbf7;
      }

      .mark {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 12px;
        background: #2d7565;
        color: #fefcf7;
      }

      svg {
        width: 24px;
        height: 24px;
      }

      p:first-of-type {
        margin: 24px 0 4px;
        color: #63635c;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        line-height: 16px;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 26px;
        line-height: 32px;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        padding: 8px 16px;
        border-radius: 8px;
        background: #252823;
        color: #fefcf7;
        font-weight: 600;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 2px solid #2a61b8;
        outline-offset: 2px;
      }

      @media (prefers-color-scheme: dark) {
        :root,
        body {
          background: #181914;
          color: #f3f0e7;
        }

        main {
          border-color: #41433b;
          background: #20211c;
        }

        p:first-of-type,
        p {
          color: #b9b6ac;
        }

        a {
          background: #eee9dc;
          color: #20211c;
        }

        a:focus-visible {
          outline-color: #79a9f2;
        }
      }
    </style>
  </head>
  <body data-opentask-offline-fallback="content-free">
    <main>
      <span class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="m5 12.5 4 4L19 7"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2.5"
          />
        </svg>
      </span>
      <p>Connection unavailable</p>
      <h1>OpenTask is offline</h1>
      <p>
        This fallback contains no account or task data. Reconnect to open your workspace; OpenTask does not
        save changes for later while offline.
      </p>
      <a href="/today">Try connection</a>
    </main>
  </body>
</html>
