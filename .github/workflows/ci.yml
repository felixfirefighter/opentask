name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: opentask
          POSTGRES_PASSWORD: opentask-local
          POSTGRES_USER: opentask
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opentask -d opentask"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      CI: true
      DATABASE_URL: postgresql://opentask:opentask-local@127.0.0.1:5432/opentask
      TEST_DATABASE_URL: postgresql://opentask:opentask-local@127.0.0.1:5432/opentask
      BETTER_AUTH_SECRET: ci-only-opentask-secret-32-characters-minimum
      BETTER_AUTH_URL: http://127.0.0.1:3107
      NEXT_TELEMETRY_DISABLED: 1
      PLAYWRIGHT_OUTPUT_DIR: ${{ runner.temp }}/opentask-playwright-results
      TZ: UTC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.14.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run the canonical verification gate
        run: pnpm verify
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Build the production image
        run: docker build --target runner --tag opentask:local .
      - name: Boot the production topology
        run: docker compose up --detach --no-build --wait
      - name: Verify the production topology
        run: pnpm test:production
      - name: Stop the production topology
        if: always()
        run: docker compose down --volumes --remove-orphans
      - name: Upload visual proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-proof-${{ github.sha }}
          path: artifacts/visual-proof/**/*.png
          if-no-files-found: error
      - name: Upload browser diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-diagnostics
          path: |
            playwright-report/
            ${{ runner.temp }}/opentask-playwright-results/
          if-no-files-found: ignore
