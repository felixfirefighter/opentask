appId: com.rarticle.opentask
productName: OpenTask
icon: desktop/branding/icon.svg
asar: true
directories:
  output: release
files:
  - dist-electron/main.js
  - dist-electron/runtime.js
  - dist-electron/target.js
  - dist-electron/preload.cjs
  - "!node_modules/**"
  - "!**/*.map"
extraResources:
  - from: .next/standalone
    to: next-server
  - from: .next/standalone/node_modules
    to: next-server/node_modules
  - from: .next/static
    to: next-server/.next/static
  - from: public
    to: next-server/public
  - from: drizzle
    to: next-server/drizzle
  - from: scripts/migrate.ts
    to: next-server/scripts/migrate.ts
  - from: shared/config
    to: next-server/shared/config
  - from: shared/logging
    to: next-server/shared/logging
  - from: dist-desktop-runtime
    to: runtime
win:
  target:
    - nsis
  artifactName: OpenTask-${version}-Windows-${arch}.${ext}
mac:
  target:
    - dmg
  category: public.app-category.productivity
  artifactName: OpenTask-${version}-macOS-${arch}.${ext}
publish: null
